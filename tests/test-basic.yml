name: Test basic usage - pull request comment branch

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: issue_comment
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock issue_comment event payload
        run: |
          mkdir -p /tmp/event
          cat > /tmp/event/event.json <<'EOF'
          {
            "action": "created",
            "issue": {
              "number": 1,
              "pull_request": {
                "url": "https://api.github.com/repos/octocat/hello-world/pulls/1"
              }
            },
            "comment": {
              "id": 1,
              "body": "test comment"
            },
            "repository": {
              "full_name": "octocat/hello-world"
            }
          }
          EOF
          echo "GITHUB_EVENT_PATH=/tmp/event/event.json" >> $GITHUB_ENV

      - id: action
        uses: .
        with:
          repo_token: ${{ github.token }}
        continue-on-error: true

      - name: Assert action ran with repo_token input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action requires a real GitHub API call to resolve PR branch info.
          # In act without real credentials, it may fail with an API error.
          # We verify the action was invoked (not skipped) and the input was accepted.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with repo_token input (outcome: $OUTCOME)"
