name: Test basic usage with repo_token input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: issue_comment
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repo_token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action ran with repo_token input
        run: |
          echo "action outcome: ${{ steps.action.outcome }}"
          # The action requires an issue_comment event with a PR comment to resolve
          # branch info via the GitHub API. In a local act environment without a
          # real PR comment event payload, the action is expected to fail gracefully.
          # What we are verifying here is that the repo_token input is accepted and
          # the action is invoked (not a configuration/input validation error).
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action was invoked with repo_token input"
