name: Test basic usage with repo_token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: issue_comment
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repo_token: ${{ github.token }}
        continue-on-error: true
      - name: Assert action was invoked with repo_token
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action requires a real GitHub API context to return PR branch info.
          # In a local act environment without a real PR comment event, the action
          # may fail to resolve the PR. We verify it was invoked (not skipped).
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked with repo_token input"
